version: '3.8'
services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: prod
    depends_on:
      - server
    networks:
      - app-network
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
    volumes:
      - ./client/nginx.conf:/etc/nginx/nginx.conf:ro
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: prod
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    networks:
      - app-network
    expose:
      - "4000"
networks:
  app-network:
    driver: bridge
