version: '3.8'
services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./client/.env
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    depends_on:
      - server
    networks:
      - app-network
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: dev
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
